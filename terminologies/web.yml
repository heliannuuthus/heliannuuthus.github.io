- slug: rest
  title: REST
  definition: Representational State Transfer，基于 HTTP 协议的架构风格，以资源为中心通过统一接口进行无状态交互。
  aliases: [RESTful]

- slug: grpc
  title: gRPC
  definition: Google 开源的高性能 RPC 框架，基于 HTTP/2 和 Protocol Buffers，支持双向流和多语言代码生成。

- slug: graphql
  title: GraphQL
  definition: Facebook 开源的 API 查询语言，客户端可精确声明所需数据结构，避免过度获取或获取不足。

- slug: websocket
  title: WebSocket
  definition: 全双工通信协议，在单个 TCP 连接上实现客户端与服务器之间的持久化双向实时数据传输。

- slug: cors
  title: CORS
  definition: Cross-Origin Resource Sharing，浏览器安全机制，通过 HTTP 头部控制跨源请求的访问权限。
