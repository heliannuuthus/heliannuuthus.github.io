name: Pre Deploy

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: heliannuuthus/hephaestus/actions/setup-pnpm@main
        with:
          node-version: "22"

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
